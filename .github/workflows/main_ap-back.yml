# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - ap-back

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D4D65AD5CA48485C880ACB8F32E51E36 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9ACD5F1155D04F3D9B19944C46F4036C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_77F66DA335C24743A59D35939DC89E0E }}

      - name: Set Azure App Service environment variables
        run: |
          az webapp config appsettings set \
            --name ap-back \
            --resource-group STS_Developments \
            --settings \
              ENVIRONMENT=production \
              FRONTEND_URL='${{ secrets.FRONTEND_URL }}' \
              DB_USER='${{ secrets.DB_USER }}' \
              DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              DB_HOST='${{ secrets.DB_HOST }}' \
              DB_PORT='${{ secrets.DB_PORT }}' \
              DB_NAME='${{ secrets.DB_NAME }}' \
              SMTP_USER='${{ secrets.SMTP_USER }}' \
              SMTP_PASSWORD='${{ secrets.SMTP_PASSWORD }}' \
              SMTP_HOST='${{ secrets.SMTP_HOST }}' \
              SMTP_PORT='${{ secrets.SMTP_PORT }}' \

      - name: Wait for SCM restart
        run: sleep 60

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ap-back'
          slot-name: 'Production'
          package: .
          