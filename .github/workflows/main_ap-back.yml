# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - ap-back

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for azure/login
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0EE136FA8D824B85B88108A7A80E7907 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D16E631F61944F06893AAD2FC773A5BC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DB210915B36E4D2D8C744BFBA039CA94 }}
      
      - name: Set Azure App Service environment variables
        run: |
          az webapp config appsettings set \
            --name ap-back \
            --resource-group STS_Developments \
            --settings \
              ENVIRONMENT=production \
              FRONTEND_URL='${{ secrets.FRONTEND_URL }}' \
              DB_USER='${{ secrets.DB_USER }}' \
              DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              DB_HOST='${{ secrets.DB_HOST }}' \
              DB_NAME='${{ secrets.DB_NAME }}' \
              DB_PORT='${{ secrets.DB_PORT }}' \
              SMTP_HOST='${{ secrets.SMTP_HOST }}' \
              SMTP_PASSWORD='${{ secrets.SMTP_PASSWORD }}' \
              SMTP_PORT='${{ secrets.SMTP_PORT }}' \
              SMTP_USER='${{ secrets.SMTP_USER }}' \

      - name: Set startup command
        run: |
          az webapp config set \
            --name ap-back \
            --resource-group STS_Developments \
            --startup-file "gunicorn -k uvicorn.workers.UvicornWorker app.main:app --timeout 0 --workers 1 --bind=0.0.0.0:8000"

      - name: Wait for SCM restart
        run: sleep 60

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'ap-back'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_267E9643BB92493FA99A16D2E0457C19 }}